<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 10px;
  border-bottom: 1px solid #334155;
  text-align: left;
  font-size: 14px;
}

.table th {
  background: #1e293b;
}

img {
  width: 60px;
  border-radius: 8px;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background: #ef4444;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 Panel Admin</h2>

<table class="table">
<thead>
<tr>
<th>Nombre</th>
<th>DNI</th>
<th>Actividad</th>
<th>Feria</th>
<th>Foto</th>
<th>Ubicación</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

const API = "https://api-ferias-da8q.onrender.com";

/* 📥 cargar datos */
async function cargar() {
  const res = await fetch(API + "/productores");
  const data = await res.json();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(p => {
    tabla.innerHTML += `
      <tr>
        <td>${p.nombre}</td>
        <td>${p.dni}</td>
        <td>${p.actividad}</td>
        <td>${p.feria}</td>
        <td>
          ${p.foto ? `<img src="${p.foto}">` : "Sin foto"}
        </td>
        <td>
          <a href="https://maps.google.com/?q=${p.lat},${p.lng}" target="_blank">📍 Ver</a>
        </td>
        <td>${p.fecha || "-"}</td>
        <td>
          <button onclick="borrar(${p.id})">Eliminar</button>
        </td>
      </tr>
    `;
  });
}

/* 🗑 borrar */
async function borrar(id) {
  if (!confirm("¿Eliminar registro?")) return;

  await fetch(API + "/productores/" + id, {
    method: "DELETE"
  });

  cargar();
}

/* 🔄 auto refresh */
setInterval(cargar, 5000);

/* inicio */
cargar();

</script>

</body>
</html>
