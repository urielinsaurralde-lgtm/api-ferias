<script>

const API = "https://api-ferias-da8q.onrender.com";

let TOKEN = localStorage.getItem("token");

let map, cluster, dataGlobal=[];
let markersMap = {};

// DOM
let buscar, filtroFeria, tabla, thead, total, modal, imgGrande;


/* INIT */
document.addEventListener("DOMContentLoaded", () => {

  buscar = document.getElementById("buscar");
  filtroFeria = document.getElementById("filtroFeria");
  tabla = document.getElementById("tabla");
  thead = document.getElementById("thead");
  total = document.getElementById("total");
  modal = document.getElementById("modal");
  imgGrande = document.getElementById("imgGrande");

  if (buscar) buscar.addEventListener("input", aplicarFiltros);
  if (filtroFeria) filtroFeria.addEventListener("change", aplicarFiltros);

  if (TOKEN) {
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";

    iniciarMapa();
    cargar();
  }
});


/* LOGIN */
async function hacerLogin(){

  const userInput = document.getElementById("user").value;
  const passInput = document.getElementById("pass").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ user: userInput, pass: passInput })
  });

  if(res.ok){
    const data = await res.json();

    TOKEN = data.token;
    localStorage.setItem("token", TOKEN);

    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";

    iniciarMapa();
    cargar();

  } else {
    alert("Credenciales incorrectas");
  }
}


/* MAPA */
function iniciarMapa(){

  if(map) return;

  const mapDiv = document.getElementById("map");
  if(!mapDiv) return;

  map = L.map("map").setView([-31.73,-60.53],12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  cluster = L.markerClusterGroup();
  map.addLayer(cluster);

  miUbicacion();
}


/* FULL */
function fullscreen(){
  const cont = document.getElementById("mapContainer");
  cont.classList.toggle("full");

  setTimeout(() => map.invalidateSize(), 300);
}


/* UBICACION */
function miUbicacion(){
  navigator.geolocation.getCurrentPosition(p=>{
    map.setView([p.coords.latitude,p.coords.longitude],14);
  });
}


/* CARGAR */
async function cargar(){

  try {

    const res = await fetch(API + "/productores", {
      headers: { "Authorization": "Bearer " + TOKEN }
    });

    if(res.status === 401){
      localStorage.removeItem("token");
      location.reload();
      return;
    }

    dataGlobal = await res.json();
    aplicarFiltros();

  } catch(e){
    console.error(e);
    alert("Error cargando datos");
  }
}


/* FILTROS */
function aplicarFiltros(){

  if(!buscar || !filtroFeria) return;

  const texto = buscar.value.toLowerCase();
  const feria = filtroFeria.value;

  const filtrados = dataGlobal.filter(p =>
    (!feria || p.feria===feria) &&
    (
      (p.nombre && p.nombre.toLowerCase().includes(texto)) ||
      (p.dni && p.dni.toString().includes(texto))
    )
  );

  render(filtrados);
}


/* RENDER */
function render(data){

  if(!tabla || !thead || !total) return;

  tabla.innerHTML="";
  thead.innerHTML="";
  total.innerText=data.length;

  if(!data.length) return;

  const cols = Object.keys(data[0]).filter(c => c !== "lng");

  cols.forEach(c=>thead.innerHTML+=`<th>${c}</th>`);
  thead.innerHTML+="<th></th>";

  cluster.clearLayers();
  markersMap = {};

  data.forEach(p=>{

    let row=`<tr onclick="irA(${p.id})">`;

    cols.forEach(c=>{
      let val=p[c];

      if(c==="foto" && val){
        val=`<img src="${val}" onclick="event.stopPropagation(); verImg('${val}')">`;
      }
      else if(!val) val="-";

      row+=`<td>${val}</td>`;
    });

    row+=`<td><button class="delete" onclick="event.stopPropagation(); borrar(${p.id})">X</button></td></tr>`;
    tabla.innerHTML+=row;

    if(p.lat && p.lng){
      const marker = L.marker([p.lat,p.lng])
        .bindPopup(`<b>${p.nombre}</b><br>${p.feria}`);

      cluster.addLayer(marker);
      markersMap[p.id] = marker;
    }
  });
}


/* IR A MAPA */
function irA(id){
  const marker = markersMap[id];
  if(!marker) return;

  map.setView(marker.getLatLng(), 17);
  setTimeout(()=>marker.openPopup(),300);
}


/* IMG */
function verImg(src){
  modal.style.display="flex";
  imgGrande.src=src;
}


/* DELETE */
async function borrar(id){

  if(!confirm("Eliminar?")) return;

  await fetch(API + "/productores/" + id, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + TOKEN }
  });

  cargar();
}

</script>
