<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0fdf4;
  margin: 0;
  color: #064e3b;
}

/* LOGIN */
.login {
  max-width: 320px;
  margin: 100px auto;
  text-align: center;
}

.login input, .login button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #d1d5db;
}

.login button {
  background: #16a34a;
  color: white;
  font-weight: bold;
}

/* PANEL */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 15px;
}

/* TOPBAR */
.topbar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.topbar input, .topbar select, .topbar button {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
}

.topbar button {
  background: #16a34a;
  color: white;
}

/* MAPA */
.map-container {
  position: relative;
  margin-bottom: 10px;
}

#map {
  height: 350px;
  border-radius: 12px;
}

.map-btn {
  position: absolute;
  bottom: 10px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: white;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  cursor: pointer;
  z-index: 1000;
}

.btn-gps { right: 10px; }
.btn-full { left: 10px; }

/* FULLSCREEN */
.map-container.full {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 9999;
  background: white;
}

.map-container.full #map {
  height: 100% !important;
  border-radius: 0;
}

/* TABLA */
.table-container {
  background: white;
  border-radius: 12px;
  overflow: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #065f46;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #bbf7d0;
}

img {
  width: 50px;
  cursor: pointer;
}

.delete {
  background: #ef4444;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  background: rgba(0,0,0,0.8);
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.logout {
  background: #ef4444;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>🔐 Panel Admin</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="hacerLogin()">Ingresar</button>
</div>

<!-- PANEL -->
<div id="panel" class="container" style="display:none;">

  <div class="header">
    <h2>📊 Dashboard</h2>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="topbar">
    <input id="buscar" placeholder="Buscar">
    <select id="filtroFeria">
      <option value="">Todas</option>
      <option>Feria 1</option>
      <option>Feria 2</option>
    </select>
    <button onclick="miUbicacion()">📍</button>
  </div>

  <div class="map-container" id="mapContainer">
    <div id="map"></div>
    <button class="map-btn btn-gps" onclick="miUbicacion()">📍</button>
    <button class="map-btn btn-full" onclick="fullscreen()">⛶</button>
  </div>

  <div class="table-container">
    <table>
      <thead><tr id="thead"></tr></thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="imgGrande">
</div>

<script>

const API = "https://api-ferias-da8q.onrender.com";

let TOKEN = localStorage.getItem("token");

let map, cluster, dataGlobal=[];
let markersMap = {};

let buscar, filtroFeria, tabla, thead, modal, imgGrande;

document.addEventListener("DOMContentLoaded", () => {

  buscar = document.getElementById("buscar");
  filtroFeria = document.getElementById("filtroFeria");
  tabla = document.getElementById("tabla");
  thead = document.getElementById("thead");
  modal = document.getElementById("modal");
  imgGrande = document.getElementById("imgGrande");

  buscar.addEventListener("input", aplicarFiltros);
  filtroFeria.addEventListener("change", aplicarFiltros);

  // AUTO LOGIN
  if (TOKEN) {
    mostrarPanel();
  }
});


/* LOGIN */
async function hacerLogin(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ user, pass })
  });

  if(res.ok){
    const data = await res.json();

    TOKEN = data.token;
    localStorage.setItem("token", TOKEN);

    mostrarPanel();
  } else {
    alert("Credenciales incorrectas");
  }
}

function mostrarPanel(){
  document.getElementById("login").style.display="none";
  document.getElementById("panel").style.display="block";

  iniciarMapa();
  cargar();
}


/* MAPA */
function iniciarMapa(){

  if(map) return;

  map = L.map("map").setView([-31.73,-60.53],12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  cluster = L.markerClusterGroup();
  map.addLayer(cluster);

  miUbicacion();
}


/* UBICACION */
function miUbicacion(){
  navigator.geolocation.getCurrentPosition(p=>{
    map.setView([p.coords.latitude,p.coords.longitude],14);
  });
}


/* FULLSCREEN */
function fullscreen(){
  const cont = document.getElementById("mapContainer");
  cont.classList.toggle("full");

  setTimeout(() => map.invalidateSize(), 300);
}


/* CARGAR */
async function cargar(){

  const res = await fetch(API + "/productores", {
    headers: {
      "Authorization": "Bearer " + TOKEN
    }
  });

  if(res.status === 401){
    logout();
    return;
  }

  dataGlobal = await res.json();
  aplicarFiltros();
}


/* FILTROS */
function aplicarFiltros(){

  const texto = buscar.value.toLowerCase();
  const feria = filtroFeria.value;

  const filtrados = dataGlobal.filter(p =>
    (!feria || p.feria===feria) &&
    (
      (p.nombre && p.nombre.toLowerCase().includes(texto)) ||
      (p.dni && p.dni.toString().includes(texto))
    )
  );

  render(filtrados);
}


/* RENDER */
function render(data){

  tabla.innerHTML="";
  thead.innerHTML="";

  if(!data.length) return;

  const cols = Object.keys(data[0]).filter(c => c !== "lng");

  cols.forEach(c=>thead.innerHTML+=`<th>${c}</th>`);
  thead.innerHTML+="<th></th>";

  cluster.clearLayers();
  markersMap = {};

  data.forEach(p=>{

    let row=`<tr onclick="irA(${p.id})">`;

    cols.forEach(c=>{
      let val=p[c];

      if(c==="foto" && val){
        val=`<img src="${val}" onclick="event.stopPropagation(); verImg('${val}')">`;
      }
      else if(!val) val="-";

      row+=`<td>${val}</td>`;
    });

    row+=`<td><button class="delete" onclick="event.stopPropagation(); borrar(${p.id})">X</button></td></tr>`;
    tabla.innerHTML+=row;

    if(p.lat && p.lng){
      const marker = L.marker([p.lat,p.lng])
        .bindPopup(`<b>${p.nombre}</b><br>${p.feria}`);

      cluster.addLayer(marker);
      markersMap[p.id] = marker;
    }
  });
}


/* IR A MAPA */
function irA(id){
  const marker = markersMap[id];
  if(!marker) return;

  map.setView(marker.getLatLng(), 17);
  setTimeout(()=>marker.openPopup(),300);
}


/* IMG */
function verImg(src){
  modal.style.display="flex";
  imgGrande.src=src;
}


/* DELETE */
async function borrar(id){

  if(!confirm("Eliminar?")) return;

  await fetch(API + "/productores/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + TOKEN
    }
  });

  cargar();
}


/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.reload();
}

</script>

</body>
</html>
