<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

/* 🌿 BASE */
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0fdf4;
  margin: 0;
  padding: 10px;
  color: #064e3b;
}

#panel {
  display: none;
  max-width: 1200px;
  margin: auto;
}

/* 🔐 LOGIN */
.login {
  max-width: 320px;
  margin: 80px auto;
  text-align: center;
}

.login input, .login button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.login button {
  background: #16a34a;
  color: white;
}

/* 🔝 TOPBAR */
.topbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.topbar input, .topbar select, .topbar button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
}

.topbar button {
  background: #16a34a;
  color: white;
}

/* 🗺️ MAPA */
.map-container {
  position: relative;
}

#map {
  width: 100%;
  height: 40vh;
  border-radius: 12px;
}

/* FULLSCREEN */
.map-container.fullscreen {
  position: fixed;
  top:0; left:0;
  width:100vw;
  height:100vh;
  z-index:9999;
}

.map-container.fullscreen #map {
  height:100%;
  border-radius:0;
}

/* BOTONES MAPA */
.map-btn {
  position: absolute;
  bottom: 10px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
}

.full-btn { left: 10px; }
.loc-btn { right: 10px; }

/* 📊 STATS */
.stats {
  margin: 10px 0;
}

/* 📋 TABLA */
.table-container {
  overflow-x: auto;
}

.table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
}

.table th, .table td {
  padding: 8px;
  border-bottom: 1px solid #e5e7eb;
}

.table th {
  background: #065f46;
  color: white;
}

img {
  width: 50px;
  border-radius: 8px;
  cursor: pointer;
}

.delete {
  background: #ef4444;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
}

/* 🖼️ MODAL IMAGEN */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.modal img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>🔐 Admin</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</div>

<!-- PANEL -->
<div id="panel">

<h2>📊 Panel ADMIN</h2>

<div class="topbar">
  <input id="buscar" placeholder="Buscar nombre o DNI">
  <select id="filtroFeria">
    <option value="">Todas</option>
    <option>Feria 1</option>
    <option>Feria 2</option>
  </select>
  <button onclick="miUbicacion()">📍 Mi ubicación</button>
</div>

<div class="stats">
  Total: <b id="total"></b>
</div>

<!-- MAPA -->
<div class="map-container" id="mapBox">
  <div id="map"></div>

  <button class="map-btn full-btn" onclick="fullscreen()">⛶</button>
  <button class="map-btn loc-btn" onclick="miUbicacion()">📍</button>
</div>

<!-- TABLA -->
<div class="table-container">
<table class="table">
<thead id="thead"></thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="cerrarModal()">
  <img id="imgModal">
</div>

<script>

const API="https://api-ferias-da8q.onrender.com";
const USER="admin", PASS="1234";

let map, cluster, dataGlobal=[];

/* LOGIN */
function login(){
if(user.value===USER && pass.value===PASS){
loginDiv.style.display="none";
panel.style.display="block";
iniciarMapa();
cargar();
}else alert("Error");
}

const loginDiv=document.getElementById("login");
const panel=document.getElementById("panel");

/* MAPA */
function iniciarMapa(){
map=L.map("map").setView([-31.73,-60.53],12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

cluster=L.markerClusterGroup();
map.addLayer(cluster);

/* 📍 UBICACION AUTOMATICA */
miUbicacion();
}

/* FULLSCREEN */
function fullscreen(){
const box=document.getElementById("mapBox");
box.classList.toggle("fullscreen");
setTimeout(()=>map.invalidateSize(),300);
}

/* UBICACION */
function miUbicacion(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;
map.setView([lat,lng],14);
});
}

/* CARGAR */
async function cargar(){
const res=await fetch(API+"/productores");
dataGlobal=await res.json();
aplicarFiltros();
}

/* FILTROS */
function aplicarFiltros(){
const texto=buscar.value.toLowerCase();
const feria=filtroFeria.value;

const filtrados=dataGlobal.filter(p=>
(!feria||p.feria===feria)&&
(p.nombre.toLowerCase().includes(texto)||p.dni.includes(texto))
);

render(filtrados);
}

/* RENDER */
function render(data){
tabla.innerHTML="";
thead.innerHTML="";
cluster.clearLayers();
total.innerText=data.length;

if(!data.length)return;

const cols=Object.keys(data[0]);

cols.forEach(c=>thead.innerHTML+=`<th>${c}</th>`);
thead.innerHTML+="<th>ACCIONES</th>";

data.forEach(p=>{
let fila="<tr>";

cols.forEach(c=>{
let v=p[c];

if(c==="foto"&&v){
v=`<img src="${v}" onclick="verImagen('${v}')">`;
}
else if(c==="lat"){
v=`<a target="_blank" href="https://maps.google.com/?q=${p.lat},${p.lng}">Ver</a>`;
}
else if(c==="lng") return;
else if(!v) v="-";

fila+=`<td>${v}</td>`;
});

fila+=`<td><button class="delete" onclick="borrar(${p.id})">X</button></td></tr>`;
tabla.innerHTML+=fila;

if(p.lat&&p.lng){
cluster.addLayer(L.marker([p.lat,p.lng]));
}
});
}

/* IMAGEN */
function verImagen(src){
modal.style.display="flex";
imgModal.src=src;
}
function cerrarModal(){
modal.style.display="none";
}

/* BORRAR */
async function borrar(id){
if(!confirm("Eliminar?")) return;
await fetch(API+"/productores/"+id,{method:"DELETE"});
cargar();
}

/* EVENTOS */
buscar.oninput=aplicarFiltros;
filtroFeria.onchange=aplicarFiltros;

/* AUTO REFRESH */
setInterval(cargar,10000);

</script>

</body>
</html>
