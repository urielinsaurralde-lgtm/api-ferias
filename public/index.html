<script>

const API = "https://api-ferias-da8q.onrender.com";

let TOKEN = localStorage.getItem("token");

let map, cluster, dataGlobal=[];
let markersMap = {};

/* LOGIN REAL */
async function hacerLogin(){

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      user: user.value,
      pass: pass.value
    })
  });

  if(res.ok){
    const data = await res.json();
    TOKEN = data.token;

    localStorage.setItem("token", TOKEN);

    login.style.display="none";
    panel.style.display="block";

    iniciarMapa();
    cargar();

  } else {
    alert("Credenciales incorrectas");
  }
}


/* AUTO LOGIN */
window.onload = () => {
  if(TOKEN){
    login.style.display="none";
    panel.style.display="block";
    iniciarMapa();
    cargar();
  }
};


/* MAPA */
function iniciarMapa(){
  map=L.map("map").setView([-31.73,-60.53],12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  cluster=L.markerClusterGroup();
  map.addLayer(cluster);

  miUbicacion();
}


/* FULLSCREEN */
function fullscreen(){
  const cont = document.getElementById("mapContainer");
  cont.classList.toggle("full");

  setTimeout(() => {
    map.invalidateSize();
  }, 300);
}


/* UBICACION */
function miUbicacion(){
  navigator.geolocation.getCurrentPosition(p=>{
    map.setView([p.coords.latitude,p.coords.longitude],14);
  });
}


/* CARGAR DATOS (CON TOKEN) */
async function cargar(){

  const res = await fetch(API + "/productores", {
    headers: {
      "Authorization": TOKEN
    }
  });

  if(res.status === 401){
    localStorage.removeItem("token");
    location.reload();
    return;
  }

  dataGlobal = await res.json();
  aplicarFiltros();
}


/* FILTROS */
function aplicarFiltros(){
  const texto = buscar.value.toLowerCase();
  const feria = filtroFeria.value;

  const filtrados = dataGlobal.filter(p =>
    (!feria || p.feria===feria) &&
    (p.nombre.toLowerCase().includes(texto) || p.dni.includes(texto))
  );

  render(filtrados);
}


/* RENDER */
function render(data){
  tabla.innerHTML="";
  thead.innerHTML="";
  total.innerText=data.length;

  if(!data.length)return;

  const cols = Object.keys(data[0]).filter(c => c !== "lng");

  cols.forEach(c=>thead.innerHTML+=`<th>${c}</th>`);
  thead.innerHTML+="<th></th>";

  cluster.clearLayers();
  markersMap = {};

  data.forEach(p=>{
    let row=`<tr onclick="irA(${p.id})">`;

    cols.forEach(c=>{
      let val=p[c];

      if(c==="foto" && val){
        val=`<img src="${val}" onclick="event.stopPropagation(); verImg('${val}')">`;
      }
      else if(!val) val="-";

      row+=`<td>${val}</td>`;
    });

    row+=`<td><button class="delete" onclick="event.stopPropagation(); borrar(${p.id})">X</button></td></tr>`;
    tabla.innerHTML+=row;

    if(p.lat && p.lng){
      const marker = L.marker([p.lat,p.lng])
        .bindPopup(`<b>${p.nombre}</b><br>${p.feria}`);

      cluster.addLayer(marker);
      markersMap[p.id] = marker;
    }
  });
}


/* IR A MAPA */
function irA(id){
  const marker = markersMap[id];
  if(!marker) return;

  const latlng = marker.getLatLng();

  map.setView(latlng, 17);
  setTimeout(()=>marker.openPopup(),300);
}


/* IMG */
function verImg(src){
  modal.style.display="flex";
  imgGrande.src=src;
}


/* DELETE (CON TOKEN) */
async function borrar(id){

  if(!confirm("Eliminar?"))return;

  await fetch(API + "/productores/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": TOKEN
    }
  });

  cargar();
}


/* EVENTOS */
buscar.addEventListener("input", aplicarFiltros);
filtroFeria.addEventListener("change", aplicarFiltros);

</script>
