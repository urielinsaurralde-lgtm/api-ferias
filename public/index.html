<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 15px;
}

/* LOGIN */
.login {
  max-width: 300px;
  margin: 100px auto;
  text-align: center;
}

.login input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.login button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
}

/* PANEL */
#panel {
  display: none;
}

h2 {
  text-align: center;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 10px;
  border-bottom: 1px solid #334155;
  text-align: left;
  font-size: 14px;
}

.table th {
  background: #1e293b;
}

img {
  width: 60px;
  border-radius: 8px;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background: #ef4444;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login" class="login">
  <h2>🔐 Admin</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</div>

<!-- 📊 PANEL -->
<div id="panel">
  <h2>📊 Panel Admin</h2>

  <table class="table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>DNI</th>
        <th>Actividad</th>
        <th>Feria</th>
        <th>Foto</th>
        <th>Ubicación</th>
        <th>Fecha</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

const API = "https://api-ferias-da8q.onrender.com";

// 🔐 credenciales
const USER = "admin";
const PASS = "1234";

/* 🔐 login */
function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === USER && p === PASS) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    cargar();
  } else {
    alert("❌ Usuario o contraseña incorrectos");
  }
}

/* 📥 cargar datos */
async function cargar() {
  const res = await fetch(API + "/productores");
  const data = await res.json();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(p => {
    tabla.innerHTML += `
      <tr>
        <td>${p.nombre}</td>
        <td>${p.dni}</td>
        <td>${p.actividad}</td>
        <td>${p.feria}</td>
        <td>
          ${p.foto ? `<img src="${p.foto}">` : "Sin foto"}
        </td>
        <td>
          <a href="https://maps.google.com/?q=${p.lat},${p.lng}" target="_blank">📍 Ver</a>
        </td>
        <td>${p.fecha || "-"}</td>
        <td>
          <button onclick="borrar(${p.id})">Eliminar</button>
        </td>
      </tr>
    `;
  });
}

/* 🗑 borrar */
async function borrar(id) {
  if (!confirm("¿Eliminar registro?")) return;

  await fetch(API + "/productores/" + id, {
    method: "DELETE"
  });

  cargar();
}

/* 🔄 auto refresh */
setInterval(() => {
  if (document.getElementById("panel").style.display === "block") {
    cargar();
  }
}, 5000);

</script>

</body>
</html>
