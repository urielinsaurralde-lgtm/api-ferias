<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI';
  background:#f1f5f9;
}

/* LOGIN */
.login{
  max-width:320px;
  margin:100px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.login input,.login button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

.login button{
  background:#16a34a;
  color:white;
}

/* HEADER */
.header{
  background:#16a34a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.logout{
  background:#dc2626;
  border:none;
  color:white;
  padding:8px;
  border-radius:8px;
}

/* CONTENT */
.container{
  padding:15px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* MAP */
#map{
  height:300px;
  border-radius:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#16a34a;
  color:white;
}

td,th{
  padding:10px;
}

/* MOBILE */
@media(max-width:600px){
  #map{height:250px;}
}

</style>
</head>

<body>

<div id="login" class="login">
  <h2>🔐 Panel</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</div>

<div id="panel" style="display:none">

<div class="header">
  <b>Dashboard</b>
  <button class="logout" onclick="logout()">Salir</button>
</div>

<div class="container">

<div class="card">
  <input id="buscar" placeholder="Buscar">
</div>

<div class="card">
  <div id="map"></div>
</div>

<div class="card">
<table>
<thead><tr id="thead"></tr></thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

</div>

<script>

const API="https://api-ferias-da8q.onrender.com";
let TOKEN=localStorage.getItem("token");

let map,cluster,dataGlobal=[];

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  if(TOKEN) iniciar();
});

/* LOGIN */
async function login(){
  const res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:user.value,
      pass:pass.value
    })
  });

  if(res.ok){
    const d=await res.json();
    TOKEN=d.token;
    localStorage.setItem("token",TOKEN);
    iniciar();
  }else alert("Error login");
}

function iniciar(){
  login.style.display="none";
  panel.style.display="block";
  iniciarMapa();
  cargar();
}

/* MAP */
function iniciarMapa(){
  map=L.map("map").setView([-31.73,-60.53],12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  cluster=L.markerClusterGroup({
    chunkedLoading:true
  });

  map.addLayer(cluster);
}

/* DATA */
async function cargar(){
  const res=await fetch(API+"/productores",{
    headers:{Authorization:"Bearer "+TOKEN}
  });

  if(res.status===401)return logout();

  dataGlobal=await res.json();
  render(dataGlobal);
}

/* RENDER */
function render(data){

  tabla.innerHTML="";
  thead.innerHTML="";

  if(!data.length)return;

  const cols=Object.keys(data[0]);

  cols.forEach(c=>thead.innerHTML+=`<th>${c}</th>`);

  cluster.clearLayers();

  data.forEach(p=>{

    let row="<tr>";

    cols.forEach(c=>{
      row+=`<td>${p[c]||"-"}</td>`;
    });

    row+="</tr>";
    tabla.innerHTML+=row;

    if(p.lat && p.lng){
      cluster.addLayer(L.marker([p.lat,p.lng]));
    }

  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.reload();
}

</script>

</body>
</html>
