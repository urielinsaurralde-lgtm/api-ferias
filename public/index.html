<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

/* BASE (MISMO ESTILO FORM) */
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0fdf4;
  margin: 0;
  padding: 10px;
  color: #064e3b;
}

#panel {
  display: none;
  max-width: 1200px;
  margin: auto;
}

/* LOGIN */
.login {
  max-width: 320px;
  margin: 80px auto;
  text-align: center;
}

.login input, .login button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #d1d5db;
}

.login button {
  background: #16a34a;
  color: white;
}

/* TOPBAR */
.topbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.topbar input,
.topbar select,
.topbar button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
}

.topbar button {
  background: #16a34a;
  color: white;
}

/* MAPA */
.map-container {
  position: relative;
}

#map {
  width: 100%;
  height: 40vh;
  min-height: 250px;
  border-radius: 15px;
}

/* FULLSCREEN */
.map-fullscreen {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 9999;
  border-radius: 0;
}

/* BOTONES MAPA */
.map-btn {
  position: absolute;
  bottom: 10px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: white;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  cursor: pointer;
}

.btn-gps { right: 10px; }
.btn-full { left: 10px; }

/* TABLA */
.table-container {
  overflow-x: auto;
}

.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.table th, .table td {
  padding: 8px;
  border-bottom: 1px solid #d1d5db;
}

.table th {
  background: #065f46;
  color: white;
}

img {
  width: 50px;
  border-radius: 6px;
  cursor: pointer;
}

/* BOTON ELIMINAR */
.delete {
  background: #ef4444;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
}

/* MODAL IMAGEN */
.modal {
  display: none;
  position: fixed;
  z-index: 10000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>🔐 Admin</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</div>

<!-- PANEL -->
<div id="panel">

<h2>📊 Panel ADMIN</h2>

<div class="topbar">
  <input id="buscar" placeholder="Buscar nombre o DNI">
  <select id="filtroFeria">
    <option value="">Todas las ferias</option>
    <option>Feria 1</option>
    <option>Feria 2</option>
  </select>
  <button onclick="miUbicacion()">📍 Mi ubicación</button>
</div>

<div>Total registros: <b id="total"></b></div>

<div class="map-container">
  <div id="map"></div>

  <button class="map-btn btn-gps" onclick="miUbicacion()">📍</button>
  <button class="map-btn btn-full" onclick="fullscreen()">⛶</button>
</div>

<div class="table-container">
<table class="table">
<thead><tr id="thead"></tr></thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarImagen()">
  <img id="imgGrande">
</div>

<script>

const API = "https://api-ferias-da8q.onrender.com";
const USER = "admin";
const PASS = "1234";

let map, cluster, dataGlobal = [];

/* LOGIN */
function login() {

  const userInput = document.getElementById("user").value;
  const passInput = document.getElementById("pass").value;

  if (userInput === USER && passInput === PASS) {

    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";

    iniciarMapa();
    cargar();

  } else {
    alert("Error de usuario o contraseña");
  }
}

/* MAPA */
function iniciarMapa() {
  map = L.map("map").setView([-31.73, -60.53], 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  cluster = L.markerClusterGroup();
  map.addLayer(cluster);

  // 📍 ubicación automática
  miUbicacion();

  setTimeout(() => map.invalidateSize(), 300);
}

/* FULLSCREEN */
function fullscreen() {
  const mapDiv = document.getElementById("map");
  mapDiv.classList.toggle("map-fullscreen");

  setTimeout(() => map.invalidateSize(), 300);
}

/* UBICACION */
function miUbicacion() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map.setView([lat, lng], 14);
  });
}

/* CARGAR */
async function cargar() {
  const res = await fetch(API + "/productores");
  dataGlobal = await res.json();
  aplicarFiltros();
}

/* FILTROS */
function aplicarFiltros() {
  const texto = buscar.value.toLowerCase();
  const feria = filtroFeria.value;

  const filtrados = dataGlobal.filter(p =>
    (!feria || p.feria === feria) &&
    (p.nombre.toLowerCase().includes(texto) || p.dni.includes(texto))
  );

  render(filtrados);
}

/* RENDER */
function render(data) {
  tabla.innerHTML = "";
  thead.innerHTML = "";
  cluster.clearLayers();
  total.innerText = data.length;

  if (!data.length) return;

  const cols = Object.keys(data[0]);

  cols.forEach(c => thead.innerHTML += `<th>${c}</th>`);
  thead.innerHTML += "<th></th>";

  data.forEach(p => {
    let row = "<tr>";

    cols.forEach(c => {
      let val = p[c];

      if (c === "foto" && val) {
        val = `<img src="${val}" onclick="verImagen('${val}')">`;
      } else if (c === "lat") {
        val = `<a href="https://maps.google.com/?q=${p.lat},${p.lng}" target="_blank">Ver</a>`;
      } else if (c === "lng") return;
      else if (!val) val = "-";

      row += `<td>${val}</td>`;
    });

    row += `<td><button class="delete" onclick="borrar(${p.id})">X</button></td></tr>`;
    tabla.innerHTML += row;

    if (p.lat && p.lng) {
      cluster.addLayer(
        L.marker([p.lat, p.lng]).bindPopup(`<b>${p.nombre}</b>`)
      );
    }
  });
}

/* IMAGEN */
function verImagen(src) {
  modal.style.display = "flex";
  imgGrande.src = src;
}

function cerrarImagen() {
  modal.style.display = "none";
}

/* BORRAR */
async function borrar(id) {
  if (!confirm("Eliminar?")) return;
  await fetch(API + "/productores/" + id, { method: "DELETE" });
  cargar();
}

/* EVENTOS */
buscar.addEventListener("input", aplicarFiltros);
filtroFeria.addEventListener("change", aplicarFiltros);

setInterval(cargar, 10000);

</script>

</body>
</html>
