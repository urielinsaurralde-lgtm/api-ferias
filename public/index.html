<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- MAPA -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

/* BASE */
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 10px;
}

#panel {
  display: none;
  max-width: 1200px;
  margin: auto;
}

/* LOGIN */
.login {
  max-width: 320px;
  margin: 80px auto;
  text-align: center;
}

.login input, .login button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* TOPBAR */
.topbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.topbar input, 
.topbar select, 
.topbar button {
  flex: 1;
  min-width: 120px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
}

.topbar button {
  background: #3b82f6;
  color: white;
}

/* MAPA */
#map {
  width: 100%;
  height: 40vh;
  min-height: 250px;
  border-radius: 15px;
  margin-bottom: 10px;
}

/* TABLA */
.table-container {
  overflow-x: auto;
}

.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 600px;
}

.table th, .table td {
  padding: 8px;
  border-bottom: 1px solid #334155;
  text-align: left;
}

.table th {
  background: #1e293b;
  position: sticky;
  top: 0;
}

img {
  width: 50px;
  border-radius: 8px;
  cursor: pointer;
}

.delete {
  background: #ef4444;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 8px;
}

/* 🔥 MODAL IMAGEN */
.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>🔐 Admin</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</div>

<!-- PANEL -->
<div id="panel">

  <h2>📊 Panel ADMIN</h2>

  <div class="topbar">
    <input id="buscar" placeholder="Buscar nombre o DNI">
    <select id="filtroFeria">
      <option value="">Todas las ferias</option>
      <option>Feria 1</option>
      <option>Feria 2</option>
    </select>
    <button onclick="miUbicacion()">📍 Mi ubicación</button>
  </div>

  <div id="map"></div>

  <div class="table-container">
    <table class="table">
      <thead>
        <tr id="thead"></tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <span class="modal-close">&times;</span>
  <img id="imgGrande">
</div>

<script>

const API = "https://api-ferias-da8q.onrender.com";

const USER = "admin";
const PASS = "1234";

let map;
let cluster;
let dataGlobal = [];

/* LOGIN */
function login() {
  if (
    document.getElementById("user").value === USER &&
    document.getElementById("pass").value === PASS
  ) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    iniciarMapa();
    cargar();
  } else {
    alert("Error login");
  }
}

/* MAPA */
function iniciarMapa() {
  map = L.map("map").setView([-31.73, -60.53], 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  cluster = L.markerClusterGroup();
  map.addLayer(cluster);
}

/* CARGAR */
async function cargar() {
  const res = await fetch(API + "/productores");
  dataGlobal = await res.json();
  aplicarFiltros();
}

/* FILTROS */
function aplicarFiltros() {
  const texto = document.getElementById("buscar").value.toLowerCase();
  const feria = document.getElementById("filtroFeria").value;

  const filtrados = dataGlobal.filter(p => {
    return (
      (!feria || p.feria === feria) &&
      (p.nombre.toLowerCase().includes(texto) || p.dni.includes(texto))
    );
  });

  render(filtrados);
}

/* RENDER */
function render(data) {
  const tabla = document.getElementById("tabla");
  const thead = document.getElementById("thead");

  tabla.innerHTML = "";
  thead.innerHTML = "";

  cluster.clearLayers();

  if (data.length === 0) return;

  const columnas = Object.keys(data[0]);

  columnas.forEach(col => {
    thead.innerHTML += `<th>${col.toUpperCase()}</th>`;
  });
  thead.innerHTML += "<th>ACCIONES</th>";

  data.forEach(p => {

    let fila = "<tr>";

    columnas.forEach(col => {

      let valor = p[col];

      if (col === "foto" && valor) {
        valor = `<img src="${valor}" onclick="verImagen('${valor}')">`;
      }
      else if (col === "lng") return;
      else if (!valor) valor = "-";

      fila += `<td>${valor}</td>`;
    });

    fila += `<td><button class="delete" onclick="borrar(${p.id})">X</button></td>`;
    fila += "</tr>";

    tabla.innerHTML += fila;

    if (p.lat && p.lng) {
      const marker = L.marker([p.lat, p.lng])
        .bindPopup(`<b>${p.nombre}</b><br>${p.feria}`);

      cluster.addLayer(marker);
    }

  });
}

/* 🔥 MODAL FUNCIONES */
function verImagen(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgGrande").src = src;
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

/* BORRAR */
async function borrar(id) {
  if (!confirm("Eliminar?")) return;

  await fetch(API + "/productores/" + id, { method: "DELETE" });
  cargar();
}

/* UBICACION */
function miUbicacion() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map.setView([lat, lng], 14);
    L.marker([lat, lng]).addTo(map).bindPopup("Tu ubicación").openPopup();
  });
}

/* EVENTOS */
document.getElementById("buscar").addEventListener("input", aplicarFiltros);
document.getElementById("filtroFeria").addEventListener("change", aplicarFiltros);

/* AUTO REFRESH */
setInterval(cargar, 10000);

</script>

</body>
</html>
